<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waveline — Scopri la Musica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810; --surface:#10101c; --surface2:#18182a; --border:#252538;
  --accent:#7c6fff; --accent-glow:rgba(124,111,255,0.22); --accent2:#ff6584;
  --text:#eeeef5; --text2:#a0a0c0; --muted:#55556e; --card:#14141f;
  --player-h:84px; --sidebar-w:230px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  height:100vh;display:grid;grid-template-rows:1fr var(--player-h);
  grid-template-columns:var(--sidebar-w) 1fr;overflow:hidden;-webkit-font-smoothing:antialiased}

/* SVG ICON util */
.ico{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{display:block}

/* SIDEBAR */
#sidebar{grid-row:1;grid-column:1;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.logo{padding:20px;font-size:17px;font-weight:800;letter-spacing:-.5px;color:var(--accent);
  border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px}
.logo-dot{color:var(--accent2)}
.nav-label{padding:18px 16px 6px;font-size:10px;font-weight:700;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;
  border-radius:8px;border:none;background:none;color:var(--text2);font-size:14px;
  font-weight:500;font-family:inherit;cursor:pointer;width:calc(100% - 16px);text-align:left;
  transition:background .12s,color .12s}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface2);color:var(--accent)}
.genre-scroll{flex:1;overflow-y:auto;padding:6px 8px 16px}
.genre-scroll::-webkit-scrollbar{width:3px}
.genre-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.genre-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;
  border-radius:7px;border:none;background:none;color:var(--text2);font-size:13px;
  font-weight:500;font-family:inherit;cursor:pointer;text-align:left;margin-bottom:1px;
  transition:background .12s,color .12s}
.genre-btn:hover{background:var(--surface2);color:var(--text)}
.genre-btn.active{background:rgba(124,111,255,.15);color:var(--accent)}
.genre-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAIN */
#main{grid-row:1;grid-column:2;overflow-y:auto;background:var(--bg)}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.topbar{position:sticky;top:0;z-index:20;background:rgba(8,8,16,.9);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;gap:10px}
.search-wrap{flex:1;max-width:500px;position:relative}
.search-ico-wrap{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;display:flex}
#searchInput{width:100%;padding:10px 16px 10px 42px;background:var(--surface2);
  border:1px solid var(--border);border-radius:30px;color:var(--text);font-size:14px;
  font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#searchInput::placeholder{color:var(--muted)}
.search-btn{padding:10px 22px;background:var(--accent);color:#fff;border:none;
  border-radius:30px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:opacity .15s;white-space:nowrap}
.search-btn:hover{opacity:.85}
.content{padding:28px}
.section-hd{font-size:18px;font-weight:700;margin-bottom:18px;display:flex;
  align-items:center;gap:10px;color:var(--text)}
.section-hd .s-ico{color:var(--accent)}
.badge{font-size:10px;font-weight:700;background:var(--accent);color:#fff;
  padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}

/* HERO */
.hero{background:linear-gradient(135deg,rgba(124,111,255,.18),rgba(255,101,132,.08));
  border:1px solid rgba(124,111,255,.2);border-radius:18px;padding:36px;margin-bottom:36px;
  position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(124,111,255,.2),transparent 70%);pointer-events:none}
.hero h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:10px;
  background:linear-gradient(90deg,var(--text) 40%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:15px;color:var(--text2);line-height:1.6;max-width:400px}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;margin-bottom:40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s}
.card:hover{transform:translateY(-4px);border-color:var(--accent);
  box-shadow:0 10px 30px rgba(124,111,255,.18)}
.card-thumb{width:100%;aspect-ratio:1;background:var(--surface2);position:relative;overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .card-thumb img{transform:scale(1.05)}
.card-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--surface2),var(--surface));color:var(--muted)}
.card-play-btn{position:absolute;bottom:10px;right:10px;width:38px;height:38px;
  background:var(--accent);border-radius:50%;display:flex;align-items:center;
  justify-content:center;opacity:0;transform:translateY(6px);
  transition:opacity .18s,transform .18s;box-shadow:0 4px 16px rgba(124,111,255,.5)}
.card:hover .card-play-btn{opacity:1;transform:translateY(0)}
.card-body{padding:12px 13px}
.card-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;color:var(--text);margin-bottom:3px}
.card-sub{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-year{font-size:11px;color:var(--muted);margin-top:4px}

/* TRACK LIST */
.track-list{margin-bottom:36px}
.track-row{display:grid;grid-template-columns:32px 44px 1fr auto auto;
  align-items:center;gap:12px;padding:9px 10px;border-radius:9px;cursor:pointer;
  transition:background .12s}
.track-row:hover{background:var(--surface2)}
.track-row.playing{background:rgba(124,111,255,.1)}
.track-num{font-size:13px;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}
.track-row.playing .track-num{color:var(--accent)}
.track-thumb{width:44px;height:44px;border-radius:7px;overflow:hidden;
  background:var(--surface2);flex-shrink:0;display:flex;align-items:center;
  justify-content:center;color:var(--muted)}
.track-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.track-meta{min-width:0}
.track-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;color:var(--text);line-height:1.3}
.track-row.playing .track-name{color:var(--accent)}
.track-artist{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-top:2px}
.track-dur{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.play-yt-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;
  border:1px solid var(--border);border-radius:20px;background:none;color:var(--text2);
  font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;
  transition:border-color .15s,color .15s;white-space:nowrap}
.play-yt-btn:hover{border-color:#ff4444;color:#ff4444}

/* GENRE BROWSE */
.genre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;margin-bottom:40px}
.genre-card{height:76px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;gap:7px;font-size:14px;font-weight:700;cursor:pointer;
  transition:transform .18s,box-shadow .18s;border:1px solid transparent}
.genre-card:hover{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.4)}

/* PLAYER */
#player{grid-row:2;grid-column:1/-1;background:var(--surface);
  border-top:1px solid var(--border);display:grid;
  grid-template-columns:1fr auto 1fr;align-items:center;padding:0 24px;gap:20px}
.p-info{display:flex;align-items:center;gap:12px;min-width:0}
.p-art{width:50px;height:50px;border-radius:9px;background:var(--surface2);overflow:hidden;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.p-art img{width:100%;height:100%;object-fit:cover;display:block}
.p-text{min-width:0}
.p-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;color:var(--text)}
.p-artist{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-top:2px}
.p-controls{display:flex;align-items:center;gap:8px}
.ctrl{background:none;border:none;color:var(--text2);cursor:pointer;width:36px;height:36px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  transition:color .12s,background .12s}
.ctrl:hover{color:var(--text);background:var(--surface2)}
.ctrl.primary{width:42px;height:42px;background:var(--accent);color:#fff}
.ctrl.primary:hover{background:#8d82ff;color:#fff}
.p-right{display:flex;justify-content:flex-end;align-items:center}
.yt-btn{display:none;align-items:center;gap:6px;padding:7px 16px;background:#cc0000;
  color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:opacity .15s}
.yt-btn:hover{opacity:.85}
.yt-btn.show{display:flex}

/* LOADING / EMPTY */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;
  padding:56px;color:var(--text2);font-size:14px}
.spinner{width:18px;height:18px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty svg{display:block;margin:0 auto 14px;opacity:.5}
.empty p{font-size:14px}

/* YT MODAL */
#ytModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:999;align-items:center;justify-content:center}
#ytModal.open{display:flex}
.yt-inner{background:var(--surface);border:1px solid var(--border);border-radius:18px;
  overflow:hidden;width:90%;max-width:740px;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.yt-hd{padding:15px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);gap:12px}
.yt-hd-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.yt-close{background:var(--surface2);border:none;color:var(--text2);cursor:pointer;
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:color .12s,background .12s}
.yt-close:hover{color:var(--text);background:var(--border)}
#ytFrame{width:100%;aspect-ratio:16/9;border:none;display:block}

@media(max-width:700px){
  body{grid-template-columns:1fr;grid-template-rows:1fr var(--player-h)}
  #sidebar{display:none}
  #main{grid-row:1;grid-column:1}
  #player{grid-row:2;grid-column:1}
  .topbar{padding:10px 14px}
  .content{padding:16px}
  .hero{padding:20px}
  .hero h1{font-size:22px}
}
</style>
</head>

<div id="sidebar">
  <div class="logo">
    <svg width="20" height="20"><use href="#i-radio"/></svg>
    wave<span class="logo-dot">line</span>
  </div>
  <div class="nav-label">Menu</div>
  <button class="nav-btn active" id="nav-home" onclick="showView('home')">
    <svg width="16" height="16"><use href="#i-home"/></svg> Home
  </button>
  <button class="nav-btn" id="nav-charts" onclick="showView('charts')">
    <svg width="16" height="16"><use href="#i-trending"/></svg> Classifiche
  </button>
  <button class="nav-btn" id="nav-browse" onclick="showView('browse')">
    <svg width="16" height="16"><use href="#i-grid"/></svg> Generi
  </button>
  <div class="nav-label">Generi</div>
  <div class="genre-scroll" id="sideGenres"></div>
</div>

<div id="main">
  <div class="topbar">
    <div class="search-wrap">
      <div class="search-ico-wrap">
        <svg width="15" height="15"><use href="#i-search"/></svg>
      </div>
      <input id="searchInput" type="text" placeholder="Cerca artisti, brani, album…"
        onkeydown="if(event.key==='Enter') doSearch()">
    </div>
    <button class="search-btn" onclick="doSearch()">Cerca</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="player">
  <div class="p-info">
    <div class="p-art" id="pArt">
      <svg width="22" height="22"><use href="#i-music"/></svg>
    </div>
    <div class="p-text">
      <div class="p-title" id="pTitle">Nessun brano selezionato</div>
      <div class="p-artist" id="pArtist">Cerca o sfoglia un genere</div>
    </div>
  </div>
  <div class="p-controls">
    <button class="ctrl" onclick="prevTrack()"><svg width="20" height="20"><use href="#i-skip-back"/></svg></button>
    <button class="ctrl primary" onclick="togglePlay()"><svg width="20" height="20"><use href="#i-play"/></svg></button>
    <button class="ctrl" onclick="nextTrack()"><svg width="20" height="20"><use href="#i-skip-fwd"/></svg></button>
  </div>
  <div class="p-right">
    <button class="yt-btn" id="ytBtn" onclick="openYT()">
      <svg width="14" height="14"><use href="#i-yt"/></svg> YouTube
    </button>
  </div>
</div>

<div id="ytModal">
  <div class="yt-inner">
    <div class="yt-hd">
      <div class="yt-hd-title" id="ytTitle">—</div>
      <button class="yt-close" onclick="closeYT()"><svg width="14" height="14"><use href="#i-x"/></svg></button>
    </div>
    <iframe id="ytFrame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
</div>

<script>
const GENRES=[
  {id:'pop',    label:'Pop',        term:'pop hits',         color:'#7c6fff', ico:'i-music'},
  {id:'rock',   label:'Rock',       term:'rock',             color:'#e63946', ico:'i-guitar'},
  {id:'hiphop', label:'Hip-Hop',    term:'hip hop rap',      color:'#f4a261', ico:'i-mic'},
  {id:'jazz',   label:'Jazz',       term:'jazz',             color:'#2a9d8f', ico:'i-music'},
  {id:'electro',label:'Elettronica',term:'electronic dance', color:'#8338ec', ico:'i-zap'},
  {id:'rnb',    label:'R&B',        term:'R&B soul',         color:'#ff6b6b', ico:'i-heart'},
  {id:'class',  label:'Classica',   term:'classical music',  color:'#457b9d', ico:'i-violin'},
  {id:'ita',    label:'Italiana',   term:'musica italiana',  color:'#009246', ico:'i-pin'},
  {id:'latin',  label:'Latin',      term:'latin reggaeton',  color:'#ff9f1c', ico:'i-flame'},
  {id:'indie',  label:'Indie',      term:'indie alternative',color:'#6b8f71', ico:'i-leaf'},
  {id:'metal',  label:'Metal',      term:'heavy metal',      color:'#778',    ico:'i-shield'},
  {id:'country',label:'Country',    term:'country music',    color:'#c9a84c', ico:'i-star'},
];

const S={tracks:[],idx:-1,ytId:null};

// sidebar
const sg=document.getElementById('sideGenres');
GENRES.forEach(g=>{
  const b=document.createElement('button');
  b.className='genre-btn'; b.dataset.id=g.id;
  b.innerHTML=`<span class="genre-dot" style="background:${g.color}"></span>${g.label}`;
  b.onclick=()=>loadGenre(g);
  sg.appendChild(b);
});

function showView(v){
  ['home','charts','browse'].forEach(n=>document.getElementById('nav-'+n).classList.toggle('active',n===v));
  if(v==='home') renderHome();
  else if(v==='charts') renderCharts();
  else renderBrowse();
}

// ── HOME ─────────────────────────────────
async function renderHome(){
  g('content').innerHTML=`
    <div class="hero">
      <h1>Scopri la musica</h1>
      <p>Esplora milioni di brani, artisti e album da tutto il mondo. Cerca qualcosa o sfoglia le classifiche.</p>
    </div>
    <div class="section-hd"><span class="s-ico">${ico('i-flame',18)}</span> In tendenza</div>
    <div id="z-trend" class="loading"><div class="spinner"></div> Caricamento…</div>
    <div class="section-hd" style="margin-top:32px"><span class="s-ico">${ico('i-pin',18)}</span> Musica italiana</div>
    <div id="z-ita" class="loading"><div class="spinner"></div> Caricamento…</div>`;
  const[trend,ita]=await Promise.all([apiTracks('top hits 2024',20),apiTracks('musica italiana 2024',20)]);
  S.tracks=[...trend,...ita];
  cardGrid('z-trend',trend,0);
  cardGrid('z-ita',ita,trend.length);
}

// ── CHARTS ───────────────────────────────
async function renderCharts(){
  g('content').innerHTML=`<div class="section-hd"><span class="s-ico">${ico('i-trending',18)}</span> Classifiche globali</div>
    <div id="z-chart" class="loading"><div class="spinner"></div> Caricamento…</div>`;
  const tracks=await apiTracks('top hits global 2024',50);
  if(!tracks.length){g('z-chart').innerHTML=emptyH('Nessun risultato');return;}
  S.tracks=tracks;
  const el=g('z-chart');
  el.className='track-list';
  el.innerHTML=tracks.map((t,i)=>rowHTML(t,i,i)).join('');
}

// ── BROWSE ────────────────────────────────
function renderBrowse(){
  g('content').innerHTML=`<div class="section-hd"><span class="s-ico">${ico('i-grid',18)}</span> Esplora per genere</div>
    <div class="genre-grid">${GENRES.map(gn=>`
      <div class="genre-card" onclick='loadGenre(${JSON.stringify(gn)})'
        style="background:linear-gradient(135deg,${gn.color}55,${gn.color}22);border-color:${gn.color}44;color:${gn.color}">
        ${ico(gn.ico,18)}${gn.label}
      </div>`).join('')}
    </div>`;
}

// ── GENRE ─────────────────────────────────
async function loadGenre(gn){
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===gn.id));
  g('content').innerHTML=`
    <div class="section-hd"><span class="s-ico" style="color:${gn.color}">${ico(gn.ico,18)}</span>${gn.label}<span class="badge">Genere</span></div>
    <div id="z-gt" class="loading"><div class="spinner"></div> Caricamento…</div>
    <div class="section-hd" style="margin-top:32px"><span class="s-ico">${ico('i-user',18)}</span> Artisti</div>
    <div id="z-ga" class="loading"><div class="spinner"></div> Caricamento…</div>`;
  const[tracks,artists]=await Promise.all([apiTracks(gn.term,30),apiArtists(gn.term)]);
  S.tracks=tracks;
  trackList('z-gt',tracks);
  artistGrid('z-ga',artists);
}

// ── SEARCH ────────────────────────────────
async function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  g('content').innerHTML=`
    <div class="section-hd"><span class="s-ico">${ico('i-search',18)}</span> Risultati per &ldquo;${tx(q)}&rdquo;</div>
    <div id="z-st" class="loading"><div class="spinner"></div> Ricerca brani…</div>
    <div class="section-hd" style="margin-top:32px"><span class="s-ico">${ico('i-user',18)}</span> Artisti</div>
    <div id="z-sa" class="loading"><div class="spinner"></div> Ricerca artisti…</div>
    <div class="section-hd" style="margin-top:32px"><span class="s-ico">${ico('i-disc',18)}</span> Album</div>
    <div id="z-sb" class="loading"><div class="spinner"></div> Ricerca album…</div>`;
  const[tracks,artists,albums]=await Promise.all([apiTracks(q,30),apiArtists(q,12),apiAlbums(q,12)]);
  S.tracks=tracks;
  trackList('z-st',tracks);
  artistGrid('z-sa',artists);
  albumGrid('z-sb',albums);
}

async function searchByArtist(name){
  document.getElementById('searchInput').value=name;
  await doSearch();
}

// ── API ───────────────────────────────────
// iTunes Search API supporta CORS nativamente — nessun proxy necessario
async function apiTracks(term,limit=24){
  try{
    const r=await fetch(`https://itunes.apple.com/search?term=${enc(term)}&entity=song&limit=${limit}&media=music`);
    const d=await r.json();
    return(d.results||[]).filter(x=>x.kind==='song');
  }catch(e){console.error('apiTracks',e);return[];}
}
async function apiArtists(term,limit=12){
  try{
    const r=await fetch(`https://itunes.apple.com/search?term=${enc(term)}&entity=musicArtist&limit=${limit}`);
    const d=await r.json();
    return(d.results||[]).filter(x=>x.wrapperType==='artist');
  }catch(e){console.error('apiArtists',e);return[];}
}
async function apiAlbums(term,limit=12){
  try{
    const r=await fetch(`https://itunes.apple.com/search?term=${enc(term)}&entity=album&limit=${limit}&media=music`);
    const d=await r.json();
    return(d.results||[]).filter(x=>x.wrapperType==='collection');
  }catch(e){console.error('apiAlbums',e);return[];}
}

// ── RENDER ────────────────────────────────
function cardGrid(id,tracks,base){
  const el=g(id);
  if(!tracks.length){el.innerHTML=emptyH('Nessun risultato');return;}
  el.className='cards-grid';
  el.innerHTML=tracks.map((t,i)=>`
    <div class="card" onclick="playTrack(${base+i})">
      <div class="card-thumb">
        ${t.artworkUrl100?`<img src="${t.artworkUrl100}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-ph>${ico('i-music',32)}</div>'">`:`<div class="card-ph">${ico('i-music',32)}</div>`}
        <div class="card-play-btn">${ico('i-play',16)}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${tx(t.trackName)}</div>
        <div class="card-sub">${tx(t.artistName)}</div>
      </div>
    </div>`).join('');
}

function rowHTML(t,i,gi){
  return`<div class="track-row" id="tr-${gi}" onclick="playTrack(${gi})">
    <div class="track-num">${i+1}</div>
    <div class="track-thumb">${t.artworkUrl60?`<img src="${t.artworkUrl60}" loading="lazy" onerror="this.style.display='none'">`:`${ico('i-music',18)}`}</div>
    <div class="track-meta">
      <div class="track-name">${tx(t.trackName)}</div>
      <div class="track-artist">${tx(t.artistName)}</div>
    </div>
    <div class="track-dur">${msMin(t.trackTimeMillis)}</div>
    <button class="play-yt-btn" onclick="event.stopPropagation();ytPlay(${gi})">${ico('i-yt',13)} Play</button>
  </div>`;
}

function trackList(id,tracks){
  const el=g(id);
  if(!tracks.length){el.innerHTML=emptyH('Nessun brano trovato');return;}
  el.className='track-list';
  el.innerHTML=tracks.map((t,i)=>rowHTML(t,i,i)).join('');
}

function artistGrid(id,artists){
  const el=g(id);
  if(!artists.length){el.innerHTML=emptyH('Nessun artista trovato');return;}
  el.className='cards-grid';
  el.innerHTML=artists.map(a=>`
    <div class="card" onclick="searchByArtist(${JSON.stringify(a.artistName)})">
      <div class="card-thumb"><div class="card-ph">${ico('i-mic',32)}</div>
        <div class="card-play-btn">${ico('i-search',16)}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${tx(a.artistName)}</div>
        <div class="card-sub">${tx(a.primaryGenreName||'')}</div>
      </div>
    </div>`).join('');
}

function albumGrid(id,albums){
  const el=g(id);
  if(!albums.length){el.innerHTML=emptyH('Nessun album trovato');return;}
  el.className='cards-grid';
  el.innerHTML=albums.map(a=>`
    <div class="card" onclick="searchByArtist(${JSON.stringify(a.artistName)})">
      <div class="card-thumb">
        ${a.artworkUrl100?`<img src="${a.artworkUrl100}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-ph>${ico('i-disc',32)}</div>'">`:`<div class="card-ph">${ico('i-disc',32)}</div>`}
        <div class="card-play-btn">${ico('i-play',16)}</div>
      </div>
      <div class="card-body">
        <div class="card-title">${tx(a.collectionName)}</div>
        <div class="card-sub">${tx(a.artistName)}</div>
        <div class="card-year">${a.releaseDate?a.releaseDate.slice(0,4):''}</div>
      </div>
    </div>`).join('');
}

function emptyH(msg){return`<div class="empty">${ico('i-music',40)}<p>${msg}</p></div>`;}

// ── PLAYER ────────────────────────────────
function playTrack(idx){
  if(idx<0||idx>=S.tracks.length)return;
  document.querySelectorAll('.track-row').forEach(r=>r.classList.remove('playing'));
  const row=document.getElementById('tr-'+idx);
  if(row){row.classList.add('playing');row.scrollIntoView({block:'nearest'});}
  S.idx=idx;
  const t=S.tracks[idx];
  document.getElementById('pTitle').textContent=t.trackName;
  document.getElementById('pArtist').textContent=t.artistName;
  const art=g('pArt');
  const img=t.artworkUrl100||t.artworkUrl60;
  art.innerHTML=img?`<img src="${img}" alt="">`:`<svg width="22" height="22"><use href="#i-music"/></svg>`;
  document.getElementById('ytBtn').classList.add('show');
  S.ytId=null;
  // ytPlay auto on select disabled
}
function togglePlay(){if(S.idx===-1&&S.tracks.length)playTrack(0);}
function nextTrack(){if(S.tracks.length)playTrack((S.idx+1)%S.tracks.length);}
function prevTrack(){if(S.tracks.length)playTrack((S.idx-1+S.tracks.length)%S.tracks.length);}

// ── YOUTUBE ───────────────────────────────
function ytPlay(idx){
  const t=S.tracks[idx];
  if(!t)return;
  const q=encodeURIComponent(t.artistName+' '+t.trackName+' official');
  window.open('https://www.youtube.com/results?search_query='+q,'_blank');
}
function openYT(){
  const t=S.tracks[S.idx];
  if(!t)return;
  const q=encodeURIComponent(t.artistName+' '+t.trackName+' official');
  window.open('https://www.youtube.com/results?search_query='+q,'_blank');
}
function closeYT(){
  const m=document.getElementById('ytModal');
  if(m){m.classList.remove('open');}
  const f=document.getElementById('ytFrame');
  if(f){f.src='';}
}
const _ym=document.getElementById('ytModal');
if(_ym)_ym.addEventListener('click',e=>{if(e.target===_ym)closeYT();});

// ── UTILS ─────────────────────────────────
function g(id){return document.getElementById(id);}
function enc(s){return encodeURIComponent(s);}
function tx(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function msMin(ms){if(!ms)return'—';const s=Math.floor(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function ico(id,size=16){return`<svg width="${size}" height="${size}" style="display:inline-block;vertical-align:middle;flex-shrink:0"><use href="#${id}"/></svg>`;}

// ── START ─────────────────────────────────
renderHome();
</script>
</body>
</html>
